name: qr_yoklama_mobil
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  mobile_scanner: ^7.2.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  encrypt: ^5.0.3
  safe_device: ^1.3.8
  geolocator: ^14.0.2
  gif: ^2.3.0
  device_info_plus: ^12.4.0
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.1
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_neu_qr.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/